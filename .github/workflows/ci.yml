name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit tests (Python 3.12, pinned deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Syntax check all Python modules
        run: |
          python -m py_compile \
            dogwatch.py mqtt_publisher.py detector.py tracker.py behavior.py \
            pipeline/dogwatch-notify.py

      - name: Run unit tests
        run: python -m pytest tests/ -v

  docker-build:
    name: Docker image build (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: dogwatch:ci

  shell-lint:
    name: Shell script syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n syntax check
        run: |
          for f in pipeline/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done
