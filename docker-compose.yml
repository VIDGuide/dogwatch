services:
  dogwatch:
    build: .
    container_name: dogwatch
    restart: unless-stopped

    # M.2 / PCIe Coral — apex driver loaded on host
    devices:
      - /dev/apex_0:/dev/apex_0

    environment:
      # Force OpenCV + FFmpeg to use TCP transport for RTSP —
      # the `?rtsp_transport=tcp` URL param doesn't reliably work
      # with OpenCV's VideoCapture FFmpeg backend.
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "rtsp_transport;tcp"

    volumes:
      - ./config.json:/app/config.json:ro
      - ./config-rear-east.json:/app/config-rear-east.json:ro
      - ./models:/app/models:ro
      - ./clips:/app/clips
      - ./clips-rear-east:/app/clips-rear-east
      # Mounted even though debug_capture_enabled defaults to false in the
      # config — the directory is harmless if unused, and this avoids
      # needing a compose edit + restart just to turn debug capture on.
      - ./debug_captures:/app/debug_captures
